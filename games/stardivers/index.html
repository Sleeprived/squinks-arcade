<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Star Divers — Squinks Arcade</title>
  <script>
    try {
      var t = localStorage.getItem("squinks.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) {
      document.documentElement.dataset.theme = "neon";
    }
  </script>
  <link rel="stylesheet" href="../../css/themes.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="topbar">
    <a class="btn ghost" href="../../">&larr; Arcade</a>
    <h1>Star Divers</h1>
    <button class="btn ghost" id="pause">Pause</button>
    <button class="btn danger" id="reset">Reset</button>
  </div>
  <div class="game-wrap">
    <div class="scorebar">
      <span>Score: <b id="score">0</b></span>
      <span>Lives: <b id="lives" class="lives">♥♥♥</b></span>
      <span class="muted">Wave: <b id="wave">1</b></span>
      <span class="muted">Best: <b id="best">0</b></span>
    </div>
    <canvas id="board"></canvas>
    <p class="hint">Drag the lower screen to slide · ship auto-fires · arrows / A,D on desktop · Space pauses.</p>
  </div>
  <div class="overlay hidden" id="over">
    <div class="card">
      <h2>Game Over</h2>
      <p id="over-msg"></p>
      <button class="btn accent" id="again">Play again</button>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
