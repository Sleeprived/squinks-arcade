<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Minesweeper — Squinks Arcade</title>
  <script>
    try {
      var t = localStorage.getItem("squinks.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) {
      document.documentElement.dataset.theme = "neon";
    }
  </script>
  <link rel="stylesheet" href="../../css/themes.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="topbar">
    <a class="btn ghost" href="../../">&larr; Arcade</a>
    <h1>Minesweeper</h1>
    <button class="btn danger" id="reset">Reset</button>
  </div>
  <div class="game-wrap">
    <div class="controls">
      <button class="btn diff" data-diff="beginner">Beginner</button>
      <button class="btn diff" data-diff="intermediate">Intermediate</button>
      <button class="btn diff" data-diff="expert">Expert</button>
    </div>
    <div class="scorebar">
      <span>Time: <b id="time">0</b>s</span>
      <span class="muted">Mines: <b id="mines">0</b></span>
      <span class="muted">Best: <b id="best">—</b></span>
    </div>
    <div class="controls">
      <button class="btn" id="flagmode">Flag mode: OFF</button>
      <button class="btn" id="new">New board</button>
    </div>
    <div id="board" class="msboard"></div>
    <p class="hint">Tap to reveal. Long-press (or right-click) to flag, or use Flag mode.</p>
  </div>
  <div class="overlay hidden" id="over">
    <div class="card">
      <h2 id="over-title">Boom</h2>
      <p id="over-msg"></p>
      <button class="btn accent" id="again">New board</button>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
