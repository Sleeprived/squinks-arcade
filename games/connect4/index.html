<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Connect 4 — Squinks Arcade</title>
  <script>
    try {
      var t = localStorage.getItem("squinks.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) {
      document.documentElement.dataset.theme = "neon";
    }
  </script>
  <link rel="stylesheet" href="../../css/themes.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="topbar">
    <a class="btn ghost" href="../../">&larr; Arcade</a>
    <h1>Connect 4</h1>
    <button class="btn danger" id="reset">Reset</button>
  </div>
  <div class="game-wrap">
    <div class="controls">
      <button class="btn diff" data-diff="easy">Easy</button>
      <button class="btn diff" data-diff="medium">Medium</button>
      <button class="btn diff" data-diff="hard">Hard</button>
    </div>
    <div class="scorebar">
      <span class="muted">Wins vs AI: <b id="wins">0</b></span>
    </div>
    <p class="msg" id="msg">Your turn. Tap a column.</p>
    <div id="board" class="c4board"></div>
    <button class="btn" id="new">New game</button>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
