<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Snake — Squinks Arcade</title>
  <script>
    try {
      var t = localStorage.getItem("squinks.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) {
      document.documentElement.dataset.theme = "neon";
    }
  </script>
  <link rel="stylesheet" href="../../css/themes.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="topbar">
    <a class="btn ghost" href="../../">&larr; Arcade</a>
    <h1>Snake</h1>
    <button class="btn danger" id="reset">Reset</button>
  </div>
  <div class="game-wrap">
    <div class="scorebar">
      <span>Score: <b id="score">0</b></span>
      <span class="muted">Best: <b id="best">0</b></span>
    </div>
    <canvas id="board"></canvas>
    <div class="dpad">
      <button class="btn up" data-dir="up" aria-label="Up">&#9650;</button>
      <button class="btn left" data-dir="left" aria-label="Left">&#9664;</button>
      <button class="btn right" data-dir="right" aria-label="Right">&#9654;</button>
      <button class="btn down" data-dir="down" aria-label="Down">&#9660;</button>
    </div>
    <p class="hint">Swipe on the board or use the arrows.</p>
  </div>
  <div class="overlay hidden" id="over">
    <div class="card">
      <h2>Game Over</h2>
      <p id="over-msg"></p>
      <button class="btn accent" id="again">Play again</button>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
